<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<aside class="sidebar" th:fragment="sidebar">

    <div class="sidebar-brand">
        <img th:src="@{/img/adirsa-logo-blanco.png}" alt="ADIRSA Logo" class="sidebar-logo-img">
        <div>
            <strong>ADIRSA</strong>
            <span>GESTIÓN DE PROYECTOS</span>
        </div>
    </div>

    <nav class="sidebar-menu">

        <a th:href="@{/dashboard}"
           class="sidebar-main-link"
           th:classappend="${activeMenu == 'dashboard'} ? ' active'">
            <span class="sidebar-main-icon">📊</span>
            <span>Dashboard</span>
        </a>

        <a th:href="@{/proyectos}"
           class="sidebar-main-link"
           th:classappend="${activeMenu == 'proyectos'} ? ' active'">
            <span class="sidebar-main-icon">📁</span>
            <span>Proyectos</span>
        </a>

        <a th:href="@{/movimientos-pendientes}"
           class="sidebar-main-link"
           th:classappend="${activeMenu == 'movimientos'} ? ' active'">
            <span class="sidebar-main-icon">🧾</span>
            <span>Facturas / Movimientos</span>
        </a>

        <details class="sidebar-group">
            <summary class="sidebar-group-title">
                <span><span class="sidebar-main-icon">👷</span> Mano de Obra</span>
            </summary>

            <div class="sidebar-submenu">
                <a th:href="@{/mano-obra}" class="sidebar-sub-link">Registros</a>
                <a href="#" class="sidebar-sub-link">Planillas</a>
                <a href="#" class="sidebar-sub-link">Reportes</a>
            </div>
        </details>

        <details class="sidebar-group">
            <summary class="sidebar-group-title">
                <span><span class="sidebar-main-icon">📈</span> Reportes</span>
            </summary>

            <div class="sidebar-submenu">
                <a href="#" class="sidebar-sub-link">Por proyecto</a>
                <a href="#" class="sidebar-sub-link">Por ítem</a>
                <a href="#" class="sidebar-sub-link">Presupuesto vs Real</a>
            </div>
        </details>

        <details class="sidebar-group">
            <summary class="sidebar-group-title">
                <span><span class="sidebar-main-icon">⚙</span> Administración</span>
            </summary>

            <div class="sidebar-submenu">
                <a th:href="@{/usuarios}" class="sidebar-sub-link">Usuarios</a>
                <a href="#" class="sidebar-sub-link">Roles</a>
                <a href="#" class="sidebar-sub-link">Configuración</a>
            </div>
        </details>

    </nav>

    <div class="sidebar-user">
        <strong>Administrador</strong>
        <span>● En línea</span>
    </div>

</aside>

</body>
</html>
