<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Proyecto - ADIRSA</title>
</head>
<body>

<h1 th:text="${proyecto.id == null ? 'Nuevo Proyecto' : 'Editar Proyecto'}"></h1>

<form th:action="@{/proyectos/guardar}" th:object="${proyecto}" method="post">

    <input type="hidden" th:field="*{id}">
    <input type="hidden" th:field="*{creadoEn}">

    <label>Código:</label><br>
    <input type="text" th:field="*{codigo}">
    <br><br>

    <label>Nombre:</label><br>
    <input type="text" th:field="*{nombre}" required>
    <br><br>

    <label>Cliente:</label><br>
    <input type="text" th:field="*{cliente}">
    <br><br>

    <label>Descripción:</label><br>
    <textarea th:field="*{descripcion}"></textarea>
    <br><br>

    <label>Fecha inicio:</label><br>
    <input type="date" th:field="*{fechaInicio}">
    <br><br>

    <label>Fecha fin estimada:</label><br>
    <input type="date" th:field="*{fechaFinEstimada}">
    <br><br>

    <label>Fecha fin real:</label><br>
    <input type="date" th:field="*{fechaFinReal}">
    <br><br>

    <label>Estado:</label><br>
    <select th:field="*{estado}">
        <option value="PLANIFICADO">Planificado</option>
        <option value="EN_EJECUCION">En ejecución</option>
        <option value="PAUSADO">Pausado</option>
        <option value="FINALIZADO">Finalizado</option>
        <option value="CANCELADO">Cancelado</option>
    </select>
    <br><br>

    <label>Presupuesto total:</label><br>
    <input type="number" step="0.01" th:field="*{presupuestoTotal}">
    <br><br>

    <button type="submit">Guardar</button>

</form>

<br>
<a href="/proyectos">Volver</a>

</body>
</html>
