<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Costos Indirectos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="fragments/sidebar :: sidebar"></div>

<div class="main-content">

    <div th:replace="fragments/header :: header('Costos Indirectos')"></div>

    <div class="content">

        <div class="card-custom">

            <h4 class="mb-4"
                th:text="${costo.id == null ? 'Registrar Costo Indirecto' : 'Editar Costo Indirecto'}">
            </h4>

            <p>
                <strong>Proyecto:</strong>
                <span th:text="${proyecto.nombre}"></span>
            </p>

            <form th:action="@{/proyectos/{id}/costos-indirectos/guardar(id=${proyecto.id})}"
                  th:object="${costo}"
                  method="post">

                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{activo}">
                <input type="hidden" th:field="*{creadoEn}">

                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label>Fecha</label>
                        <input type="date" th:field="*{fecha}" class="form-control" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Categoría</label>
                        <select th:field="*{categoria}" class="form-control">
                            <option value="">Seleccione</option>
                            <option value="ALIMENTACION">Alimentación</option>
                            <option value="HIGIENE_SEGURIDAD">Higiene y Seguridad</option>
                            <option value="ADMINISTRACION">Administración</option>
                            <option value="SERVICIOS">Servicios</option>
                            <option value="COMBUSTIBLE_GENERAL">Combustible</option>
                            <option value="OTROS">Otros</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Proveedor</label>
                        <input type="text" th:field="*{proveedor}" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label># Factura</label>
                        <input type="text" th:field="*{numeroFactura}" class="form-control">
                    </div>

                    <div class="col-md-8 mb-3">
                        <label>Descripción</label>
                        <textarea th:field="*{descripcion}" class="form-control" required></textarea>
                    </div>

                    <div class="col-md-3 mb-3">
                        <label>Unidad de medida</label>
                        <input type="text" th:field="*{unidadMedida}" class="form-control">
                    </div>

                    <div class="col-md-3 mb-3">
                        <label>Cantidad</label>
                        <input type="number" step="0.01" th:field="*{cantidad}" class="form-control">
                    </div>

                    <div class="col-md-3 mb-3">
                        <label>Costo unitario</label>
                        <input type="number" step="0.01" th:field="*{costoUnitario}" class="form-control">
                    </div>

                    <div class="col-md-3 mb-3">
                        <label>Subtotal</label>
                        <input type="number" step="0.01" th:field="*{subtotal}" class="form-control" readonly>
                    </div>

                    <div class="col-md-3 mb-3">
                        <label>IVA</label>
                        <input type="number" step="0.01" th:field="*{iva}" class="form-control" readonly>
                    </div>

                    <div class="col-md-3 mb-3">
                        <label>Total</label>
                        <input type="number" step="0.01" th:field="*{total}" class="form-control" readonly>
                    </div>

                </div>

                <div class="mt-4">

                    <button type="submit" class="btn btn-primary-custom">
                        Guardar
                    </button>

                    <a th:href="@{/proyectos/{id}(id=${proyecto.id})}"
                       class="btn btn-outline-secondary">
                        Cancelar
                    </a>

                </div>

            </form>

        </div>

    </div>
</div>

</body>
</html>
