<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Importar Movimientos</title>
</head>
<body>

<h1>Importar movimientos pendientes</h1>

<p>
    Proyecto:
    <strong th:text="${proyecto.nombre}"></strong>
</p>

<form th:action="@{/proyectos/{id}/movimientos-pendientes/importar(id=${proyecto.id})}"
      method="post"
      enctype="multipart/form-data">

    <label>Archivo Excel:</label><br>
    <input type="file" name="archivo" accept=".xlsx,.xls" required>

    <br><br>

    <button type="submit">Importar</button>

</form>

<br>

<a th:href="@{/proyectos/{id}(id=${proyecto.id})}">
    Volver al proyecto
</a>

</body>
</html>
