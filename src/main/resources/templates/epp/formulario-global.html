<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EPP Global</title>
</head>
<body>

<h1 th:text="${epp.id == null ? 'Registrar EPP (Global)' : 'Editar EPP (Global)'}"></h1>

<p><strong>Proyecto:</strong> <span th:text="${proyecto.nombre}"></span></p>

<form th:action="@{/proyectos/{id}/epp/guardar(id=${proyecto.id})}"
      th:object="${epp}" method="post">

    <input type="hidden" th:field="*{id}">
    <input type="hidden" th:field="*{activo}">
    <input type="hidden" th:field="*{creadoEn}">

    <label>Fecha:</label><br>
    <input type="date" th:field="*{fecha}" required>
    <br><br>

    <label>Vendedor:</label><br>
    <input type="text" th:field="*{vendedor}">
    <br><br>

    <label># Factura:</label><br>
    <input type="text" th:field="*{numeroFactura}">
    <br><br>

    <label>Descripción:</label><br>
    <textarea th:field="*{descripcion}" required></textarea>
    <br><br>

    <label>Unidad de medida:</label><br>
    <input type="text" th:field="*{unidadMedida}">
    <br><br>

    <label>Cantidad:</label><br>
    <input type="number" step="0.01" th:field="*{cantidad}">
    <br><br>

    <label>Costo unitario:</label><br>
    <input type="number" step="0.01" th:field="*{costoUnitario}">
    <br><br>

    <button type="submit">Guardar</button>

</form>

<br>

<a th:href="@{/proyectos/{id}(id=${proyecto.id})}">
    Volver al proyecto
</a>

</body>
</html>
