<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Subcontratos</title>
</head>
<body>

<h1 th:text="${subcontrato.id == null ? 'Registrar Subcontrato' : 'Editar Subcontrato'}"></h1>

<p><strong>Proyecto:</strong> <span th:text="${proyecto.nombre}"></span></p>
<p><strong>Ítem:</strong> <span th:text="${item.descripcion}"></span></p>

<form th:action="@{/items/{id}/subcontratos/guardar(id=${item.id})}"
      th:object="${subcontrato}" method="post">

    <input type="hidden" th:field="*{id}">
    <input type="hidden" th:field="*{activo}">
    <input type="hidden" th:field="*{creadoEn}">

    <label>Fecha:</label><br>
    <input type="date" th:field="*{fecha}" required><br><br>

    <label>Subcontratista:</label><br>
    <input type="text" th:field="*{subcontratista}" required><br><br>

    <label># Contrato:</label><br>
    <input type="text" th:field="*{numeroContrato}"><br><br>

    <label># Factura:</label><br>
    <input type="text" th:field="*{numeroFactura}"><br><br>

    <label>Descripción:</label><br>
    <textarea th:field="*{descripcion}" required></textarea><br><br>

    <label>Monto:</label><br>
    <input type="number" step="0.01" th:field="*{monto}"><br><br>

    <label>Estado:</label><br>
    <select th:field="*{estado}">
        <option value="PENDIENTE">Pendiente</option>
        <option value="EN_PROCESO">En proceso</option>
        <option value="PAGADO">Pagado</option>
        <option value="CANCELADO">Cancelado</option>
    </select><br><br>

    <button type="submit">Guardar</button>

</form>

<br>

<a th:href="@{/items/{id}(id=${item.id})}">Volver</a>

</body>
</html>
